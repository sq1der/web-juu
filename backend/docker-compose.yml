services:
  db:
    image: postgis/postgis:16-3.4-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: washbook
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: washbook
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: